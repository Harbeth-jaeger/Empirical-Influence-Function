<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saliency Comparison Viewer</title>
  <style>
    :root { --bg:#f6f7fb; --panel:#fff; --ink:#1d2433; --muted:#6b7280; --line:#d8dce8; --blue:#3157d5; --code-bg:#101422; --code-ink:#dfe7ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
    header { height:56px; display:flex; align-items:center; gap:18px; padding:0 22px; border-bottom:1px solid var(--line); background:var(--panel); }
    header h1 { font-size:17px; margin:0; letter-spacing:0; font-weight:750; color:var(--blue); }
    header .meta { color:var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    main { display:grid; grid-template-columns:320px minmax(520px,1fr) 390px; height:calc(100vh - 56px); min-height:560px; }
    aside, section { min-width:0; overflow:auto; }
    aside.controls { background:var(--panel); border-right:1px solid var(--line); padding:18px 16px 26px; }
    .field { margin-bottom:15px; }
    label { display:block; font-size:11px; color:var(--muted); font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:7px; }
    select, input[type="number"] { width:100%; height:36px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); padding:0 10px; font-size:14px; }
    .checkrow { display:flex; align-items:center; gap:8px; margin:8px 0; color:var(--ink); font-size:13px; }
    .sample-card { border:1px solid var(--line); border-radius:7px; padding:12px; background:#fbfcff; margin-top:16px; font-size:13px; line-height:1.45; }
    .sample-card b { color:var(--blue); }
    .pillrow { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
    .pill { border-radius:999px; padding:3px 8px; background:#edf2f7; color:#334155; font-size:12px; }
    .workspace { display:grid; grid-template-rows:auto 1fr; min-width:0; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 16px; background:#fbfcff; border-bottom:1px solid var(--line); }
    .toolbar .title { min-width:0; font-size:13px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .legend { display:flex; gap:9px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:4px; }
    .codepane { background:var(--code-bg); color:var(--code-ink); overflow:auto; padding:22px 26px 44px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace; font-size:14px; line-height:1.9; white-space:pre-wrap; }
    .tok { display:inline; padding:2px 2px 3px; border-radius:4px; border:1px solid transparent; cursor:default; transition:background .12s ease,border-color .12s ease,box-shadow .12s ease; }
    .tok.prompt_code { background:rgba(69,88,141,.38); }
    .tok.prompt_other { background:rgba(91,99,120,.20); color:#b7c0d8; }
    .tok.completion { background:rgba(35,116,76,.38); cursor:pointer; }
    .tok.after_completion { color:#78809a; }
    .tok.hidden { display:none; }
    .tok.selected-target { background:#f4c542; color:#171717; border-color:#f8e08a; box-shadow:0 0 0 2px rgba(244,197,66,.25); }
    .tok.source-rank-1,
    .tok.source-rank-2,
    .tok.source-rank-3,
    .tok.source-rank-4,
    .tok.source-rank-5 {
      border-color:#ff7a1a;
      box-shadow:0 0 0 2px rgba(255,122,26,.34);
    }
    aside.details { background:var(--panel); border-left:1px solid var(--line); padding:18px 16px 28px; }
    .details h2 { font-size:15px; margin:0 0 6px; color:var(--blue); }
    .details .sub { color:var(--muted); font-size:12px; margin-bottom:14px; line-height:1.45; }
    table { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0 18px; }
    th, td { border-bottom:1px solid var(--line); padding:7px 5px; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
    td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .token-chip { display:inline-block; max-width:115px; overflow:hidden; text-overflow:ellipsis; vertical-align:bottom; white-space:nowrap; border-radius:4px; padding:2px 5px; background:#eef2ff; color:#263a8c; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .model-block { border:1px solid var(--line); border-radius:7px; padding:10px; margin-bottom:10px; background:#fbfcff; }
    .model-block h3 { margin:0 0 6px; font-size:13px; color:var(--ink); }
    .muted { color:var(--muted); }
    .empty { color:var(--muted); font-size:13px; padding:12px; border:1px dashed var(--line); border-radius:7px; background:#fafafa; }
    @media (max-width:1100px) { main { grid-template-columns:280px 1fr; } aside.details { grid-column:1 / -1; border-left:0; border-top:1px solid var(--line); max-height:42vh; } }
  </style>
</head>
<body>
  <header><h1>Saliency Comparison Viewer</h1><div id="headerMeta" class="meta"></div></header>
  <main>
    <aside class="controls">
      <div class="field"><label for="languageSelect">Language</label><select id="languageSelect"></select></div>
      <div class="field"><label for="sampleSelect">Sample</label><select id="sampleSelect"></select></div>
      <div class="field"><label for="modelSelect">Model</label><select id="modelSelect"></select></div>
      <div class="field"><label for="scopeSelect">Source Scope</label><select id="scopeSelect"><option value="prompt_code">FIM prefix/suffix code</option><option value="prompt_all">All prompt tokens</option><option value="all_causal">All causal tokens</option></select></div>
      <div class="field"><label for="topKInput">Top K</label><input id="topKInput" type="number" min="1" max="20" value="5" /></div>
      <div class="checkrow"><input id="hideSpecial" type="checkbox" checked /> <span>Hide special tokens</span></div>
      <div class="checkrow"><input id="hideWhitespace" type="checkbox" /> <span>Hide whitespace-only tokens</span></div>
      <div id="sampleCard" class="sample-card"></div>
    </aside>
    <section class="workspace">
      <div class="toolbar"><div id="tokenTitle" class="title"></div><div class="legend"><span><i class="dot" style="background:#45588d"></i>prompt code</span><span><i class="dot" style="background:#23744c"></i>completion</span><span><i class="dot" style="background:#f4c542"></i>selected target</span></div></div>
      <div id="codePane" class="codepane"></div>
    </section>
    <aside class="details">
      <h2 id="detailsTitle">No token selected</h2><div id="detailsSub" class="sub"></div><div id="topTable"></div>
      <h2>Cross-Model View</h2><div id="comparisonPanel"></div>
    </aside>
  </main>
  <script>window.SALIENCY_DATA = __SALIENCY_DATA_JSON__;</script>
  <script>
    const DATA = window.SALIENCY_DATA;
    const els = {
      language: document.getElementById('languageSelect'), sample: document.getElementById('sampleSelect'), model: document.getElementById('modelSelect'), scope: document.getElementById('scopeSelect'), topK: document.getElementById('topKInput'), hideSpecial: document.getElementById('hideSpecial'), hideWhitespace: document.getElementById('hideWhitespace'), sampleCard: document.getElementById('sampleCard'), codePane: document.getElementById('codePane'), tokenTitle: document.getElementById('tokenTitle'), detailsTitle: document.getElementById('detailsTitle'), detailsSub: document.getElementById('detailsSub'), topTable: document.getElementById('topTable'), comparison: document.getElementById('comparisonPanel'), headerMeta: document.getElementById('headerMeta')
    };
    const state = { language:'', sampleId:'', model:'', selectedTarget:null };
    const MODEL_ORDER = ['Ours GraphSignal','Ours GraphSignal 500','CLEAR','XTF','IB-FT','TokenCleaning','Base Qwen','LLM-CleanCode'];
    const MODEL_DISPLAY = {'Ours GraphSignal 500':'Ours GraphSignal'};
    function displayModelName(name) { return MODEL_DISPLAY[name] || name; }
    function modelOrderIndex(name) { const idx = MODEL_ORDER.indexOf(name); return idx >= 0 ? idx : 1000; }
    function esc(s) { return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
    function displayToken(t) { if (!t) return ''; const raw = t.token ?? t.text ?? t.display ?? ''; if (raw === '\n' || raw === '\\n' || t.display === '\\n') return '[newline]'; if (raw === '\t' || raw === '\\t' || t.display === '\\t') return '[tab]'; if (raw === ' ' || t.display === ' ') return '[space]'; if (raw === '' || t.display === '') return '[empty]'; return t.display ?? raw; }
    function tokenTextForCode(t) { if (!t) return ''; const raw = t.text ?? t.token ?? t.display ?? ''; if (raw === '\n' || raw === '\\n' || t.display === '\\n') return '\n'; if (raw === '\t' || raw === '\\t' || t.display === '\\t') return '\t'; return raw; }
    function modelNames() { const names = new Set(); for (const s of DATA.samples || []) for (const n of Object.keys(s.models || {})) names.add(n); return [...names].sort((a,b)=>modelOrderIndex(a)-modelOrderIndex(b)||displayModelName(a).localeCompare(displayModelName(b))); }
    function currentSample() { return (DATA.samples || []).find(s => s.sample_id === state.sampleId) || (DATA.samples || [])[0]; }
    function currentModelResult(sample, modelName = state.model) { return sample?.models?.[modelName] || null; }
    function modelTokens(sample, modelName = state.model) { const m = currentModelResult(sample, modelName); return m?.tokens || sample?.tokens || []; }
    function modelGeneratedIndices(sample, modelName = state.model) { const m = currentModelResult(sample, modelName); return m?.generated_token_indices || sample?.completion_token_indices || []; }
    function getTargetResult(sample, modelName, targetIdx) { const m = currentModelResult(sample, modelName); if (!m || m.skipped) return null; return m.targets?.[String(targetIdx)] || null; }
    function targetByStep(sample, modelName, step) { const m = currentModelResult(sample, modelName); if (!m || m.skipped) return null; const idx = m.targets_by_step?.[String(step)]; if (idx !== undefined) return m.targets?.[String(idx)] || null; for (const t of Object.values(m.targets || {})) if (Number(t.step) === Number(step)) return t; return getTargetResult(sample, modelName, state.selectedTarget); }
    function selectedTargetResult(sample) { return getTargetResult(sample, state.model, state.selectedTarget); }
    function firstAvailableTarget(sample, modelName) { const ids = modelGeneratedIndices(sample, modelName); if (ids.length) return ids[0]; const m = currentModelResult(sample, modelName); const keys = Object.keys(m?.targets || {}).map(Number).sort((a,b)=>a-b); return keys[0] ?? null; }
    function fillControls() { const languages = [...new Set((DATA.samples || []).map(s => s.language))].sort(); els.language.innerHTML = languages.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join(''); state.language = state.language || languages[0] || ''; els.language.value = state.language; const models = modelNames(); els.model.innerHTML = models.map(m=>`<option value="${esc(m)}">${esc(displayModelName(m))}</option>`).join(''); state.model = state.model || models[0] || ''; els.model.value = state.model; fillSampleSelect(); els.headerMeta.textContent = `${(DATA.samples || []).length} samples · ${models.length} models · ${DATA.generation_mode || 'teacher-forced'} · ${DATA.saliency_definition || ''}`; }
    function fillSampleSelect() { const samples = (DATA.samples || []).filter(s=>s.language===state.language); els.sample.innerHTML = samples.map(s=>{ const label = `${s.source_dataset} · row ${s.row_index} · ${s.uid}`; return `<option value="${esc(s.sample_id)}">${esc(label)}</option>`; }).join(''); if (!samples.find(s=>s.sample_id===state.sampleId)) state.sampleId = samples[0]?.sample_id || ''; els.sample.value = state.sampleId; }
    function tokenClasses(t, sourceMap) { const cls = ['tok', t.region]; if (Number(t.idx) === Number(state.selectedTarget)) cls.push('selected-target'); const rank = sourceMap.get(Number(t.idx)); if (rank) cls.push(`source-rank-${Math.min(rank,5)}`); if (els.hideSpecial.checked && t.is_special) cls.push('hidden'); if (els.hideWhitespace.checked && t.is_whitespace) cls.push('hidden'); return cls.join(' '); }
    function sourceMapFor(sample) { const map = new Map(); const target = selectedTargetResult(sample); const rows = (target?.scopes?.[els.scope.value] || []).slice(0, Math.max(1, Number(els.topK.value || 5))); for (const item of rows) map.set(Number(item.idx), Number(item.rank)); return map; }
    function renderTokens() { const sample = currentSample(); if (!sample) return; const tokens = modelTokens(sample); if (state.selectedTarget == null) state.selectedTarget = firstAvailableTarget(sample, state.model); const sourceMap = sourceMapFor(sample); els.codePane.innerHTML = tokens.map(t=>{ const click = t.region === 'completion' && getTargetResult(sample, state.model, t.idx) ? ` data-target="${t.idx}"` : ''; const title = `#${t.idx} ${t.region} ${displayToken(t)}`; return `<span class="${tokenClasses(t, sourceMap)}" data-idx="${t.idx}"${click} title="${esc(title)}">${esc(tokenTextForCode(t))}</span>`; }).join('') || '<div class="empty">No token data. Run compute_model_saliency.py first.</div>'; els.codePane.querySelectorAll('[data-target]').forEach(node=>node.addEventListener('click',()=>{ state.selectedTarget = Number(node.getAttribute('data-target')); renderAll(false); })); const token = tokens.find(t=>Number(t.idx)===Number(state.selectedTarget)); els.tokenTitle.textContent = `${sample.language} · ${sample.source_dataset} · ${sample.uid} · ${displayModelName(state.model)} · selected #${state.selectedTarget ?? ''} ${token ? displayToken(token) : ''}`; }
    function renderSampleCard() { const s = currentSample(); if (!s) { els.sampleCard.innerHTML = '<div class="empty">No sample loaded.</div>'; return; } const kw = s.selection?.unique_keywords || []; els.sampleCard.innerHTML = `<b>${esc(s.language)}</b> · ${esc(s.source_dataset)}<br>row ${esc(s.row_index)} · chars ${esc(s.selection?.code_chars_after_comment_strip ?? '')}<br><span class="muted">${esc(s.uid)}</span><div class="pillrow">${kw.map(k=>`<span class="pill">${esc(k)}</span>`).join('')}</div>`; }
    function renderTopTable() { const sample = currentSample(); const tokens = modelTokens(sample); const token = tokens.find(t=>Number(t.idx)===Number(state.selectedTarget)); const target = selectedTargetResult(sample); els.detailsTitle.textContent = token ? `Target #${token.idx}: ${displayToken(token)}` : 'No token selected'; els.detailsSub.textContent = target ? `Model: ${displayModelName(state.model)}; step: ${target.step ?? 'n/a'}; query position: ${target.query_idx}; scope: ${els.scope.value}` : 'No saliency result for this token/model.'; if (!target) { const m = currentModelResult(sample, state.model); els.topTable.innerHTML = `<div class="empty">${esc(m?.skipped ? m.reason : 'missing target result')}</div>`; return; } const rows = (target.scopes?.[els.scope.value] || []).slice(0, Math.max(1, Number(els.topK.value || 5))); if (!rows.length) { els.topTable.innerHTML = '<div class="empty">No source tokens in this scope.</div>'; return; } els.topTable.innerHTML = `<table><thead><tr><th>Rank</th><th>Source</th><th>Idx</th><th>Region</th><th>Saliency</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.rank}</td><td><span class="token-chip">${esc(displayToken(r))}</span></td><td class="num">${r.idx}</td><td>${esc(r.region)}</td><td class="num">${Number(r.value).toFixed(6)}</td></tr>`).join('')}</tbody></table>`; }
    function renderComparison() { const sample = currentSample(); const selected = selectedTargetResult(sample); const step = selected?.step; const models = modelNames(); const topK = Math.max(1, Number(els.topK.value || 5)); els.comparison.innerHTML = models.map(name=>{ const target = step === undefined ? getTargetResult(sample, name, state.selectedTarget) : targetByStep(sample, name, step); const m = currentModelResult(sample, name); if (!target) return `<div class="model-block"><h3>${esc(displayModelName(name))}</h3><div class="muted">${esc(m?.skipped ? m.reason : 'No target at this generation step')}</div></div>`; const rows = (target.scopes?.[els.scope.value] || []).slice(0, topK); return `<div class="model-block"><h3>${esc(displayModelName(name))} <span class="muted">step ${esc(target.step ?? '')}: ${esc(displayToken(target))}</span></h3><table><tbody>${rows.map(r=>`<tr><td>${r.rank}</td><td><span class="token-chip">${esc(displayToken(r))}</span></td><td class="num">${Number(r.value).toFixed(6)}</td></tr>`).join('')}</tbody></table></div>`; }).join(''); }
    function renderAll(resetTarget = true) { const sample = currentSample(); if (resetTarget) state.selectedTarget = firstAvailableTarget(sample, state.model); renderSampleCard(); renderTokens(); renderTopTable(); renderComparison(); }
    els.language.addEventListener('change',()=>{ state.language=els.language.value; fillSampleSelect(); renderAll(true); });
    els.sample.addEventListener('change',()=>{ state.sampleId=els.sample.value; renderAll(true); });
    els.model.addEventListener('change',()=>{ state.model=els.model.value; renderAll(true); });
    els.scope.addEventListener('change',()=>renderAll(false)); els.topK.addEventListener('change',()=>renderAll(false)); els.hideSpecial.addEventListener('change',()=>renderAll(false)); els.hideWhitespace.addEventListener('change',()=>renderAll(false));
    fillControls(); renderAll(true);
  </script>
</body>
</html>
