<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphSignal Dynamic Annotation Viewer</title>
  <style>
    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --surface2: #f0eff9;
      --border: #dddbe8;
      --text: #1a1b2e;
      --dim: #6b7280;
      --accent: #4263eb;
      --code-bg: #1e1e2e;
      --code-fg: #cdd6f4;
      --attn: #facc15;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    h1 {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }
    .stats { font-size: 11px; color: var(--dim); }
    .layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    aside {
      width: 312px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sec {
      padding: 13px 15px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sec-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .sample-list {
      max-height: 190px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fafafa;
    }
    .sample-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 9px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 10px;
      text-align: left;
      cursor: pointer;
    }
    .sample-btn:last-child { border-bottom: 0; }
    .sample-btn:hover { background: var(--surface2); }
    .sample-btn.active { background: var(--accent); color: #fff; }
    .sample-meta { color: inherit; opacity: .72; white-space: nowrap; }
    .legend-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }
    .legend-item input { accent-color: var(--accent); cursor: pointer; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dir-group { display: flex; gap: 6px; }
    .dir-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--dim);
      font: inherit;
      font-size: 10px;
      padding: 6px 0;
      border-radius: 5px;
      cursor: pointer;
    }
    .dir-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    #info-panel {
      flex: 1;
      padding: 14px 15px 22px;
      overflow-y: auto;
      min-height: 260px;
    }
    .ph { font-size: 11px; color: var(--dim); line-height: 1.65; }
    .info-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 3px;
    }
    .info-count {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .panel-subtitle {
      margin: 12px 0 6px;
      color: var(--dim);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .edge-row, .attn-row {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 7px;
      align-items: center;
      padding: 5px 8px;
      background: var(--surface2);
      border-left: 3px solid;
      border-radius: 0 4px 4px 0;
      margin-bottom: 5px;
      font-size: 10.5px;
    }
    .edge-tok, .attn-tok { font-weight: 600; word-break: break-all; }
    .edge-sub, .attn-score { color: var(--dim); font-size: 9px; white-space: nowrap; }
    main {
      flex: 1;
      overflow: auto;
      background: var(--code-bg);
      position: relative;
    }
    #code-pre {
      font-size: 13.5px;
      line-height: 2;
      padding: 24px 36px;
      color: var(--code-fg);
      white-space: pre;
      tab-size: 4;
      margin: 0;
      min-height: 100%;
    }
    .tok {
      border-radius: 3px;
      cursor: pointer;
      transition: background .1s, box-shadow .1s;
    }
    .tok:hover { background: rgba(66,99,235,.30) !important; box-shadow: 0 0 0 1px rgba(66,99,235,.5) !important; }
    .tok.completion { text-decoration: underline dotted rgba(250,204,21,.34); text-underline-offset: 4px; }
    .tok.selected {
      background: rgba(66,99,235,.62) !important;
      box-shadow: 0 0 0 1.5px #4263eb !important;
      color: #fff !important;
    }
    .tok.attn-hit {
      background: rgba(250,204,21,.24) !important;
      box-shadow: 0 0 0 1px rgba(250,204,21,.72) !important;
    }
    #arrow-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #3a3a52; border-radius: 3px; }
    aside::-webkit-scrollbar-thumb, #info-panel::-webkit-scrollbar-thumb, .sample-list::-webkit-scrollbar-thumb {
      background: var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">GraphSignal Dynamic Annotation Viewer</h1>
    <span class="stats" id="stats-label"></span>
  </header>
  <div class="layout">
    <aside>
      <div class="sec">
        <div class="sec-title">Samples</div>
        <div class="sample-list" id="sample-list"></div>
      </div>
      <div class="sec">
        <div class="sec-title">Edge types</div>
        <div class="legend-grid" id="legend"></div>
      </div>
      <div class="sec">
        <div class="sec-title">Arrow direction</div>
        <div class="dir-group">
          <button class="dir-btn" data-dir="out" title="Show outgoing annotation edges">→ Out</button>
          <button class="dir-btn active" data-dir="both" title="Show all annotation edges">↔ Both</button>
          <button class="dir-btn" data-dir="in" title="Show incoming annotation edges">← In</button>
        </div>
      </div>
      <div id="info-panel">
        <p class="ph">Choose a sample, then click a completion token. Annotation edges are solid; attention top-k prompt tokens are gold dashed arrows.</p>
      </div>
    </aside>
    <main id="code-area">
      <pre id="code-pre"></pre>
    </main>
  </div>
  <svg id="arrow-svg" xmlns="http://www.w3.org/2000/svg">
    <defs id="arrow-defs"></defs>
  </svg>
  <script id="viewer-data" type="application/json">__VIEWER_DATA__</script>
  <script>
    const DATA = JSON.parse(document.getElementById('viewer-data').textContent);
    const SUBTYPE_COLORS = DATA.subtype_colors;
    const ATTENTION_COLOR = '#facc15';
    const NS = 'http://www.w3.org/2000/svg';
    const arrowSvg = document.getElementById('arrow-svg');
    const defs = document.getElementById('arrow-defs');
    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    let currentSample = null;
    let currentIndex = 0;
    let activeIdx = null;
    let showDir = 'both';
    let activeSubtypes = new Set(Object.keys(SUBTYPE_COLORS).filter(Boolean));
    let adj = {};

    function markerId(color) {
      return 'arr-' + color.replace('#', '');
    }

    function resetMarkers(colors) {
      defs.innerHTML = '';
      [...new Set([...colors, ATTENTION_COLOR])].forEach(color => {
        const marker = document.createElementNS(NS, 'marker');
        marker.setAttribute('id', markerId(color));
        marker.setAttribute('viewBox', '0 -5 10 10');
        marker.setAttribute('refX', '9');
        marker.setAttribute('refY', '0');
        marker.setAttribute('markerWidth', '5');
        marker.setAttribute('markerHeight', '5');
        marker.setAttribute('orient', 'auto');
        const path = document.createElementNS(NS, 'path');
        path.setAttribute('d', 'M0,-5L10,0L0,5Z');
        path.setAttribute('fill', color);
        marker.appendChild(path);
        defs.appendChild(marker);
      });
    }

    function renderSampleList() {
      const box = document.getElementById('sample-list');
      box.innerHTML = DATA.samples.map((s, i) => `
        <button class="sample-btn ${i === currentIndex ? 'active' : ''}" data-sample-ord="${i}">
          <span>#${s.sample_index}</span>
          <span class="sample-meta">${s.tokens.length} tok · ${s.edges.length} edge</span>
        </button>
      `).join('');
      box.querySelectorAll('.sample-btn').forEach(btn => {
        btn.addEventListener('click', () => loadSample(parseInt(btn.dataset.sampleOrd, 10)));
      });
    }

    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = Object.entries(SUBTYPE_COLORS)
        .filter(([st]) => st)
        .map(([st, color]) => `
          <label class="legend-item">
            <input type="checkbox" class="subtype-cb" value="${esc(st)}" checked>
            <span class="dot" style="background:${color}"></span>${esc(st)}
          </label>
        `).join('');
      legend.querySelectorAll('.subtype-cb').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) activeSubtypes.add(cb.value);
          else activeSubtypes.delete(cb.value);
          refresh();
        });
      });
    }

    function buildAdj(sample) {
      adj = {};
      sample.edges.forEach(l => {
        const color = l.color || SUBTYPE_COLORS[l.subtype] || SUBTYPE_COLORS[''] || '#94a3b8';
        (adj[l.source] ??= []).push({ other: l.target, color, subtype: l.subtype || 'unknown', dir: 'out' });
        (adj[l.target] ??= []).push({ other: l.source, color, subtype: l.subtype || 'unknown', dir: 'in' });
      });
    }

    function tokenHtml(sample) {
      return sample.tokens.map(t => {
        const cls = t.is_completion ? 'tok completion' : 'tok';
        const label = t.text === '' ? ' ' : t.text;
        return `<span class="${cls}" data-idx="${t.idx}" data-label="${esc(label)}">${esc(label)}</span>`;
      }).join('');
    }

    function loadSample(i) {
      currentIndex = i;
      currentSample = DATA.samples[i];
      activeIdx = null;
      buildAdj(currentSample);
      resetMarkers(currentSample.edges.map(e => e.color || SUBTYPE_COLORS[e.subtype] || '#94a3b8'));
      renderSampleList();
      document.getElementById('title').textContent = `Ours GraphSignal annotation edges · sample ${currentSample.sample_index}`;
      document.getElementById('stats-label').textContent =
        `${currentSample.tokens.length} tokens · ${currentSample.edges.length} annotation edges · top-${DATA.config.top_k_prompt} attention`;
      document.getElementById('code-pre').innerHTML = tokenHtml(currentSample);
      document.getElementById('code-area').scrollTop = 0;
      document.getElementById('code-area').scrollLeft = 0;
      clearArrows();
      document.getElementById('info-panel').innerHTML =
        '<p class="ph">Click a completion token to inspect annotation edges and attention top prompt tokens.</p>';
      document.querySelectorAll('.tok').forEach(span => {
        span.addEventListener('click', e => {
          e.stopPropagation();
          activeIdx = parseInt(span.dataset.idx, 10);
          refresh();
        });
      });
    }

    function spanByIdx(idx) {
      return document.querySelector(`.tok[data-idx="${idx}"]`);
    }

    function visibleEdges() {
      if (activeIdx === null) return [];
      return (adj[activeIdx] || []).filter(e =>
        activeSubtypes.has(e.subtype) && (showDir === 'both' || e.dir === showDir)
      );
    }

    function attentionRows() {
      if (activeIdx === null || !currentSample.attention_topk) return [];
      return currentSample.attention_topk[String(activeIdx)] || [];
    }

    function clearArrows() {
      arrowSvg.querySelectorAll('path.arrow').forEach(el => el.remove());
    }

    function clearHighlights() {
      document.querySelectorAll('.tok').forEach(s => {
        s.classList.remove('selected', 'attn-hit');
        s.style.background = '';
        s.style.boxShadow = '';
      });
    }

    function refresh() {
      clearHighlights();
      clearArrows();
      if (activeIdx === null) return;
      const sel = spanByIdx(activeIdx);
      if (sel) sel.classList.add('selected');
      visibleEdges().forEach(edge => {
        const other = spanByIdx(edge.other);
        if (other) {
          other.style.background = edge.color + '3a';
          other.style.boxShadow = `0 0 0 1px ${edge.color}88`;
        }
      });
      attentionRows().forEach(row => {
        const source = spanByIdx(row.source);
        if (source) source.classList.add('attn-hit');
      });
      drawArrows();
      updateInfoPanel();
    }

    function drawArrows() {
      const fromEl = spanByIdx(activeIdx);
      if (!fromEl) return;
      visibleEdges().forEach(edge => {
        const toEl = spanByIdx(edge.other);
        if (!toEl || toEl === fromEl) return;
        const fr = fromEl.getBoundingClientRect();
        const tr = toEl.getBoundingClientRect();
        const fx = fr.left + fr.width / 2;
        const fy = fr.top + fr.height / 2;
        const tx = tr.left + tr.width / 2;
        const ty = tr.top + tr.height / 2;
        const coords = edge.dir === 'out' ? [fx, fy, tx, ty] : [tx, ty, fx, fy];
        appendArrow(...coords, edge.color, false, 1.8);
      });
      attentionRows().forEach((row, rank) => {
        const sourceEl = spanByIdx(row.source);
        const targetEl = spanByIdx(activeIdx);
        if (!sourceEl || !targetEl || sourceEl === targetEl) return;
        const sr = sourceEl.getBoundingClientRect();
        const tr = targetEl.getBoundingClientRect();
        appendArrow(
          sr.left + sr.width / 2,
          sr.top + sr.height / 2,
          tr.left + tr.width / 2,
          tr.top + tr.height / 2,
          ATTENTION_COLOR,
          true,
          Math.max(1.1, 2.2 - rank * 0.18)
        );
      });
    }

    function appendArrow(x1, y1, x2, y2, color, dashed, width) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const bend = Math.min(len * 0.28, dashed ? 42 : 60);
      const cx = (x1 + x2) / 2 - (dy / len) * bend;
      const cy = (y1 + y2) / 2 + (dx / len) * bend;
      const p = document.createElementNS(NS, 'path');
      p.classList.add('arrow');
      p.setAttribute('d', `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
      p.setAttribute('stroke', color);
      p.setAttribute('stroke-width', String(width));
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke-opacity', dashed ? '0.86' : '0.72');
      if (dashed) p.setAttribute('stroke-dasharray', '5 4');
      p.setAttribute('marker-end', `url(#${markerId(color)})`);
      arrowSvg.appendChild(p);
    }

    function labelOf(idx) {
      return currentSample.tokens[idx]?.display || currentSample.tokens[idx]?.text || String(idx);
    }

    function updateInfoPanel() {
      const token = currentSample.tokens[activeIdx];
      const total = (adj[activeIdx] || []).length;
      const edges = visibleEdges();
      const attn = attentionRows();
      const edgeRows = edges.map(e => `
        <div class="edge-row" style="border-color:${e.color}">
          <span>${e.dir === 'out' ? '→' : '←'}</span>
          <span class="edge-tok">${esc(labelOf(e.other))}</span>
          <span class="edge-sub">${esc(e.subtype)}</span>
        </div>
      `).join('');
      const attnRows = attn.map((r, i) => `
        <div class="attn-row" style="border-color:${ATTENTION_COLOR}">
          <span>${i + 1}</span>
          <span class="attn-tok">#${r.source} ${esc(r.token)}</span>
          <span class="attn-score">${Number(r.score).toFixed(4)}</span>
        </div>
      `).join('');
      const noAttn = DATA.config.with_attention
        ? '<p class="ph">No prompt-token attention top-k stored for this token.</p>'
        : '<p class="ph">This viewer was generated without --with_attention, so only annotation edges are available.</p>';
      document.getElementById('info-panel').innerHTML = `
        <div class="info-name">${esc(token?.display || token?.text || activeIdx)}</div>
        <div class="info-count">#${activeIdx} · ${token?.is_completion ? 'completion' : 'prompt/system'} token</div>
        <div class="panel-subtitle">Annotation edges</div>
        ${edgeRows || '<p class="ph">No annotation edges match the current filters.</p>'}
        <div class="panel-subtitle">Attention top prompt tokens</div>
        ${attnRows || noAttn}
      `;
    }

    document.getElementById('code-area').addEventListener('click', e => {
      if (!e.target.classList.contains('tok')) {
        activeIdx = null;
        clearHighlights();
        clearArrows();
        document.getElementById('info-panel').innerHTML =
          '<p class="ph">Click a completion token to inspect annotation edges and attention top prompt tokens.</p>';
      }
    });
    document.getElementById('code-area').addEventListener('scroll', () => {
      clearArrows();
      if (activeIdx !== null) drawArrows();
    }, { passive: true });
    window.addEventListener('resize', () => {
      clearArrows();
      if (activeIdx !== null) drawArrows();
    });
    document.querySelectorAll('.dir-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showDir = btn.dataset.dir;
        refresh();
      });
    });

    renderLegend();
    if (DATA.samples.length > 0) {
      loadSample(0);
    } else {
      document.getElementById('stats-label').textContent = 'no samples';
    }
  </script>
</body>
</html>
